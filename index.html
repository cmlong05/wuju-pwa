<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="物居">
  <meta name="theme-color" content="#5B8FF9">
  <link rel="manifest" href="/wuju-pwa/manifest.json">
  <link rel="icon" href="/wuju-pwa/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/wuju-pwa/icons/icon-512.png">
  <link rel="stylesheet" href="/wuju-pwa/css/style.css">
  <title>物居</title>
</head>
<body>
  <div id="app">
    <div id="header">
      <button class="back">‹ 返回</button>
      <span class="title">物居</span>
      <span class="action"></span>
    </div>
    <div id="content">
      <div style="text-align:center;padding:40px 16px;color:var(--text-secondary)">
        <div style="font-size:48px;margin-bottom:12px">⏳</div>
        <div>加载中…</div>
        <div id="load-status" style="font-size:13px;margin-top:8px"></div>
      </div>
    </div>
    <div id="tabs">
      <button class="tab active" data-tab="items">
        <span class="icon">📋</span>物品
      </button>
      <button class="tab" data-tab="spaces">
        <span class="icon">🗂️</span>空间
      </button>
      <button class="tab" data-tab="alerts">
        <span class="icon">🔔</span>提醒
      </button>
      <button class="tab" data-tab="scan">
        <span class="icon">📷</span>扫描
      </button>
    </div>
  </div>

  <script>
    var _loadStatus = document.getElementById('load-status');
    function _status(msg) { if(_loadStatus) _loadStatus.textContent = msg; }
    _status('正在加载资源…');
  </script>
  <script src="/wuju-pwa/js/dexie.min.js?v=5"></script>
  <script src="/wuju-pwa/js/qrcode.min.js?v=1"></script>
  <script src="/wuju-pwa/js/html5-qrcode.min.js?v=1"></script>
  <script>
    if (typeof Dexie === 'undefined') {
      _status('❌ Dexie 库未加载，请检查网络');
    } else {
      _status('✅ Dexie 就绪，初始化数据库…');
    }
  </script>
  <script src="/wuju-pwa/js/db.js?v=5"></script>
  <script src="/wuju-pwa/js/app.js?v=5"></script>
</body>
</html>
