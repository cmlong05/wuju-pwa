        <div id="load-status" style="font-size:13px;margin-top:8px"></div>
      </div>

      <button class="tab active" data-tab="items">
        <span class="icon">📋</span>物品
      </button>
      <button class="tab" data-tab="spaces">
        <span class="icon">🗂️</span>空间
      </button>
      <button class="tab" data-tab="alerts">
        <span class="icon">🔔</span>提醒
      </button>
      <button class="tab" data-tab="scan">
        <span class="icon">📷</span>扫描
      </button>

  <script>
    var _loadStatus = document.getElementById('load-status');
    function _status(msg) { if(_loadStatus) _loadStatus.textContent = msg; }
    _status('正在加载资源…');
  </script>
  <script src="/wuju-pwa/js/dexie.min.js"></script>
  <script src="/wuju-pwa/js/zxing-library.min.js"></script>
  <script src="/wuju-pwa/js/zxing-browser.min.js"></script>
  <script>
    if (typeof Dexie === 'undefined') {
      _status('❌ Dexie 库未加载，请检查网络');
    } else {
      _status('✅ Dexie 就绪，初始化数据库…');
    }
  </script>
  <script type="module" src="/wuju-pwa/js/app.js"></script>
