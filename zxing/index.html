<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ZXing 扫码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover}
#status{position:fixed;top:50px;left:0;right:0;z-index:99;text-align:center;font-size:14px;color:#5ad8a6;text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none;padding:0 16px}
#result{position:fixed;bottom:100px;left:16px;right:16px;z-index:99;background:rgba(0,0,0,.7);color:#5ad8a6;padding:12px 16px;border-radius:10px;text-align:center;font-size:15px;display:none;word-break:break-all}
#controls{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:16px}
#controls button{width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer}
#controls button:active{background:rgba(255,255,255,.3)}
</style>
</head>
<body>
<video id="video" playsinline muted autoplay></video>
<div id="status">启动中…</div>
<div id="result"></div>
<div id="controls">
<button id="btnCam">🔄</button>
<button id="btnFlash">💡</button>
<button id="btnFile">🖼️</button>
</div>

<script src="zxing-library.min.js"></script>
<script src="zxing-browser.min.js"></script>
<script>
var $=function(id){return document.getElementById(id)};
var reader, stream, track, flash=false, facingBack=true, scanStart=0, rafId=null;
var videoEl = $('video');
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d', {willReadFrequently: true});

async function init(){
  reader = new ZXing.BrowserMultiFormatReader();
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  reader.hints = hints;
  await start();
}

async function start(){
  stopScan();
  $('result').style.display='none';
  $('btnFlash').style.display='none';
  $('status').textContent='启动摄像头…';
  $('status').style.color='#fff';

  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}

  var deviceId = null;
  try{
    var devices = await reader.listVideoInputDevices();
    if(facingBack){
      var back = devices.find(function(d){return /back|rear|environment/i.test(d.label||'')});
      deviceId = back ? back.deviceId : (devices[0] ? devices[0].deviceId : null);
    } else {
      var front = devices.find(function(d){return /front|user/i.test(d.label||'')});
      deviceId = front ? front.deviceId : (devices[0] ? devices[0].deviceId : null);
    }
  }catch(e){}

  var constraints = {video: {facingMode: facingBack?'environment':'user', width:{ideal:1280}, height:{ideal:720}}};
  if(deviceId) constraints.video.deviceId = {exact: deviceId};

  try{
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = stream;
    await videoEl.play();
  }catch(e){
    $('status').textContent='❌ 摄像头: '+(e.message||e);
    $('status').style.color='#ff6b6b';
    return;
  }

  track = stream.getVideoTracks()[0];
  try{
    $('btnFlash').style.display = track && ('torch' in (track.getCapabilities()||{})) ? '' : 'none';
  }catch(e){$('btnFlash').style.display='none'}

  scanStart = performance.now();
  $('status').textContent='⚡ ZXing — 对准条码';
  $('status').style.color='#5ad8a6';

  // 用 requestAnimationFrame 手动抓帧，避过 iOS Safari decodeFromVideoElement 兼容问题
  scanFrame();
}

function scanFrame(){
  if(!stream || !videoEl || videoEl.readyState < 2){
    if(stream) rafId = requestAnimationFrame(scanFrame);
    return;
  }

  var vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if(!vw || !vh){
    if(stream) rafId = requestAnimationFrame(scanFrame);
    return;
  }

  if(canvas.width !== vw || canvas.height !== vh){
    canvas.width = vw;
    canvas.height = vh;
  }

  ctx.drawImage(videoEl, 0, 0, vw, vh);

  // BrowserMultiFormatReader 没有 decodeFromCanvas，用底层 BinaryBitmap API
  try {
    var src = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    var bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
    var result = reader.decodeBitmap(bmp);

    var dt = (performance.now()-scanStart).toFixed(0);
    $('result').style.display='block';
    $('result').innerHTML='✅ <b>'+result.text+'</b><br><small>'+dt+'ms</small>';
    $('status').textContent='识别成功! ('+dt+'ms)';
    $('status').style.color='#5ad8a6';
    setTimeout(function(){
      $('result').style.display='none';
      scanStart = performance.now();
      if(stream) rafId = requestAnimationFrame(scanFrame);
    }, 3000);
  } catch(err){
    // NotFoundException — QR 码不在画面中，继续扫描
    if(stream) rafId = requestAnimationFrame(scanFrame);
  }
}

function stopScan(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  reader && reader.reset();
}

function stop(){
  stopScan();
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
}

$('btnCam').onclick=function(){
  facingBack=!facingBack;
  $('btnFlash').style.display='none';
  $('result').style.display='none';
  stop();
  start();
};

$('btnFlash').onclick=function(){
  if(!track)return;
  flash=!flash;
  try{
    track.applyConstraints({advanced:[{torch:flash}]});
    $('btnFlash').textContent=flash?'🔦':'💡';
  }catch(e){}
};

$('btnFile').onclick=function(){
  var i=document.createElement('input');i.type='file';i.accept='image/*';
  i.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    $('status').textContent='解析…';
    var url=URL.createObjectURL(f);
    reader.decodeFromImageUrl(url).then(function(r){
      $('result').style.display='block';
      $('result').innerHTML='✅ <b>'+r.text+'</b>';
      URL.revokeObjectURL(url);
    }).catch(function(){
      $('result').style.display='block';
      $('result').innerHTML='❌ 未识别';
      URL.revokeObjectURL(url);
    });
  };
  i.click();
};

init().catch(function(e){
  $('status').textContent='❌ '+(e.message||e);
  $('status').style.color='#ff6b6b';
});
</script>
</body>
</html>
