<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ZXing 扫码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#video{width:100%;height:100%;object-fit:cover}
#status{position:fixed;top:50px;left:0;right:0;z-index:99;text-align:center;font-size:14px;color:#5ad8a6;text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none;padding:0 16px}
#controls{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:16px}
#controls button{width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer}
#controls button:active{background:rgba(255,255,255,.3)}
#closeBtn{position:fixed;top:16px;right:16px;z-index:99;padding:8px 16px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:14px;cursor:pointer}
#startOverlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:#000}
#startBtn{padding:16px 48px;border-radius:12px;border:none;background:rgba(0,200,100,.8);color:#fff;font-size:18px;font-weight:600;cursor:pointer}
#startBtn:active{background:rgba(0,200,100,1)}
</style>
</head>
<body>
<video id="video" playsinline muted autoplay></video>
<div id="status">启动中…</div>
<button id="closeBtn" onclick="goBack()">✕ 关闭</button>
<div id="controls">
<button id="btnCam">🔄</button>
<button id="btnFlash">💡</button>
<button id="btnFile">🖼️</button>
</div>
<div id="startOverlay">
<button id="startBtn">📷 点击开始扫描</button>
</div>

<script src="zxing-library.min.js"></script>
<script src="zxing-browser.min.js"></script>
<script>
var $=function(id){return document.getElementById(id)};
var reader, stream, track, flash=false, facingBack=true, scanStart=0, rafId=null;
var videoEl = $('video');
var canvas = document.createElement('canvas');
var ctx = canvas.getContext('2d', {willReadFrequently: true});

function initReader(){
  reader = new ZXing.BrowserMultiFormatReader();
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  reader.hints = hints;
}

function goBack(){
  stop();
  window.location.href = '/wuju-pwa/';
}

// Check if returning from a scan that was done on another page
// (not needed here since we redirect back)

$('startBtn').onclick = async function(){
  $('startOverlay').style.display = 'none';
  initReader();
  try { await start(); } catch(e) {
    $('status').textContent='❌ '+(e.message||e);
    $('status').style.color='#ff6b6b';
  }
};

async function start(){
  stopScan();
  $('btnFlash').style.display='none';
  $('status').textContent='启动摄像头…';
  $('status').style.color='#fff';

  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}

  var attempts = [];
  var targetMode = facingBack ? 'environment' : 'user';

  try{
    var devices = await reader.listVideoInputDevices();
    if(devices && devices.length){
      var match = null;
      var re = facingBack ? /back|rear|environment/i : /front|user/i;
      match = devices.find(function(d){return re.test(d.label||'');});
      if(match){
        attempts.push({video:{deviceId:{ideal:match.deviceId},width:{ideal:1280},height:{ideal:720}}});
      }
    }
  }catch(e){}

  attempts.push({video:{facingMode:{ideal:targetMode},width:{ideal:1280},height:{ideal:720}}});
  attempts.push({video:{facingMode:targetMode}});
  attempts.push({video:true});

  stream = null;
  for(var i = 0; i < attempts.length; i++){
    try{
      stream = await navigator.mediaDevices.getUserMedia(attempts[i]);
      break;
    }catch(e){}
  }

  if(!stream){
    $('status').textContent='❌ 摄像头不可用';
    $('status').style.color='#ff6b6b';
    return;
  }

  videoEl.srcObject = stream;
  await videoEl.play();

  track = stream.getVideoTracks()[0];
  try{
    $('btnFlash').style.display = track && ('torch' in (track.getCapabilities()||{})) ? '' : 'none';
  }catch(e){$('btnFlash').style.display='none'}

  scanStart = performance.now();
  $('status').textContent='⚡ ZXing ('+targetMode+') — 对准条码';
  $('status').style.color='#5ad8a6';

  scanFrame();
}

function scanFrame(){
  if(!stream || videoEl.readyState < 2){
    if(stream) rafId = requestAnimationFrame(scanFrame);
    return;
  }

  var vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if(!vw || !vh){
    if(stream) rafId = requestAnimationFrame(scanFrame);
    return;
  }

  if(canvas.width !== vw || canvas.height !== vh){
    canvas.width = vw;
    canvas.height = vh;
  }
  ctx.drawImage(videoEl, 0, 0, vw, vh);

  try {
    var src = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
    var bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
    var result = reader.decodeBitmap(bmp);

    var dt = (performance.now()-scanStart).toFixed(0);
    stop();
    // Save result to localStorage and go back
    try { localStorage.setItem('wuju-scan-result', result.text); } catch(e) {}
    window.location.href = '/wuju-pwa/';
  } catch(err){
    if(stream) rafId = requestAnimationFrame(scanFrame);
  }
}

function stopScan(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  reader && reader.reset();
}

function stop(){
  stopScan();
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
}

$('btnCam').onclick=function(){
  facingBack=!facingBack;
  $('btnFlash').style.display='none';
  stop();
  setTimeout(function(){ start(); }, 300);
};

$('btnFlash').onclick=function(){
  if(!track)return;
  flash=!flash;
  try{
    track.applyConstraints({advanced:[{torch:flash}]});
    $('btnFlash').textContent=flash?'🔦':'💡';
  }catch(e){}
};

$('btnFile').onclick=function(){
  var i=document.createElement('input');i.type='file';i.accept='image/*';
  i.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    $('status').textContent='解析…';
    var url=URL.createObjectURL(f);
    reader.decodeFromImageUrl(url).then(function(r){
      URL.revokeObjectURL(url);
      stop();
      try { localStorage.setItem('wuju-scan-result', r.text); } catch(e) {}
      window.location.href = '/wuju-pwa/';
    }).catch(function(){
      URL.revokeObjectURL(url);
      $('status').textContent='❌ 未识别';
      $('status').style.color='#ff6b6b';
    });
  };
  i.click();
};
</script>
</body>
</html>
