server {
    listen 80;
    listen 443 ssl http2;
    server_name wuju.bumooby.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/wuju.bumooby.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wuju.bumooby.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    location /wuju-pwa/ {
        try_files $uri $uri/ /wuju-pwa/index.html;
    }

    location = /wuju-pwa/sw.js {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|json|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /wuju-pwa/manifest.json {
        add_header Cache-Control "no-cache";
    }

    location ^~ /scantest/ {
        alias /usr/share/nginx/html/wuju-pwa/scantest/;
        try_files $uri $uri/ /scantest/index.html;
    }

    location ^~ /zxing/ {
        alias /usr/share/nginx/html/wuju-pwa/zxing/;
        try_files $uri $uri/ /zxing/index.html;
    }
}
