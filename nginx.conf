server {
    listen 80;
    server_name wuju.bumooby.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name wuju.bumooby.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/wuju.bumooby.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wuju.bumooby.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    location /wuju-pwa/ {
        try_files $uri $uri/ /wuju-pwa/index.html;
    }

    location = /wuju-pwa/sw.js {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|json|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /wuju-pwa/manifest.json {
        add_header Cache-Control "no-cache";
    }
}
