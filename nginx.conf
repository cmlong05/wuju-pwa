server {
    listen 80;
    listen 443 ssl http2;
    server_name wuju.bumooby.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/wuju.bumooby.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wuju.bumooby.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    location /wuju-pwa/ {
        try_files $uri $uri/ /wuju-pwa/index.html;
    }

    location = /wuju-pwa/sw.js {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|json|ico)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /wuju-pwa/manifest.json {
        add_header Cache-Control "no-cache";
    }

    location ^~ /scantest/ {
        alias /usr/share/nginx/html/wuju-pwa/scantest/;
        try_files $uri $uri/ /scantest/index.html;
    }

    location ^~ /qrscanner/ {
        # 全量反向代理，包括静态资源——零本地干扰
        resolver 8.8.8.8 valid=300s;
        resolver_timeout 5s;
        proxy_pass https://the-qr-scanner.com/;
        proxy_set_header Host the-qr-scanner.com;
        proxy_set_header Accept-Encoding "";
        proxy_ssl_server_name on;
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;
        sub_filter '/_astro/' '/qrscanner/_astro/';
        sub_filter 'https://the-qr-scanner.com' 'https://wuju.bumooby.com:8444';
        sub_filter 'https://static.the-qr-scanner.com' 'https://wuju.bumooby.com:8444/qrscanner-static';
    }

    # 代理原站 CDN 的静态资源
    location ^~ /qrscanner-static/ {
        resolver 8.8.8.8 valid=300s;
        proxy_pass https://static.the-qr-scanner.com/;
        proxy_set_header Host static.the-qr-scanner.com;
        proxy_ssl_server_name on;
    }

    # 代理原站 _astro 资源
    location ^~ /qrscanner/_astro/ {
        resolver 8.8.8.8 valid=300s;
        proxy_pass https://the-qr-scanner.com/_astro/;
        proxy_set_header Host the-qr-scanner.com;
        proxy_ssl_server_name on;
    }

    location ^~ /zxing/ {
        alias /usr/share/nginx/html/wuju-pwa/zxing/;
        try_files $uri $uri/ /zxing/index.html;
    }
}
