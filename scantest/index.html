<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>扫码测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    /* 摄像头容器 — 必须明确尺寸 */
    #qr-video {
      width: 100vw; height: 100vh; height: 100dvh;
      position: relative;
    }
    /* 库自建 video 填满 */
    #qr-video video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
    /* 状态 */
    #status {
      position: fixed; top: 50px; left: 0; right: 0; z-index: 20;
      text-align: center; font-size: 14px; color: #5ad8a6;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6); pointer-events: none;
    }
    /* 按钮 */
    #controls {
      position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; gap: 16px;
    }
    #controls button {
      width: 48px; height: 48px; border-radius: 50%;
      border: none; background: rgba(255,255,255,0.15);
      color: #fff; font-size: 20px; cursor: pointer;
    }
    #controls button:active { background: rgba(255,255,255,0.3); }
    #result {
      position: fixed; bottom: 110px; left: 16px; right: 16px; z-index: 20;
      background: rgba(0,0,0,0.7); color: #5ad8a6;
      padding: 12px 16px; border-radius: 10px;
      text-align: center; font-size: 15px; display: none;
      word-break: break-all;
    }
    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 30; color: #fff; font-size: 16px;
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #5ad8a6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="qr-video"></div>
<div id="status">⚡ 对准二维码</div>
<div id="result"></div>
<div id="controls">
  <button id="btn-camera" title="切换摄像头">🔄</button>
  <button id="btn-flash" title="手电筒">💡</button>
  <button id="btn-file" title="相册">🖼️</button>
</div>
<div id="loading"><span class="spinner"></span>启动摄像头…</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
var $ = function(id) { return document.getElementById(id); };
var scanner = null, facingBack = true, scanActive = false, videoTrack = null, flashOn = false;

function showStatus(msg, color) { $('status').textContent = msg; $('status').style.color = color || '#5ad8a6'; }

function checkTorch() {
  try { return videoTrack && 'torch' in videoTrack.getCapabilities(); } catch(_) { return false; }
}

function toggleFlash() {
  if (!videoTrack) return;
  flashOn = !flashOn;
  try {
    videoTrack.applyConstraints({ advanced: [{ torch: flashOn }] });
    $('btn-flash').textContent = flashOn ? '🔦' : '💡';
  } catch(_) {}
}

async function stopScanner() {
  if (scanner) {
    try { if (scanner.getState() === 2) await scanner.stop(); } catch(_) {}
    try { scanner.clear(); } catch(_) {}
    scanner = null;
  }
  scanActive = false; flashOn = false; videoTrack = null;
}

async function startScanner() {
  $('loading').style.display = ''; $('result').style.display = 'none'; $('btn-flash').style.display = 'none';
  await stopScanner();
  scanner = new Html5Qrcode('qr-video');
  await scanner.start(
    { facingMode: facingBack ? 'environment' : 'user' },
    { fps: 5, qrbox: { width: 250, height: 250 }, aspectRatio: 1, disableFlip: false,
      videoConstraints: {
        width: { ideal: 1080 },
        height: { ideal: 1080 },
        facingMode: facingBack ? 'environment' : 'user'
      }
    },
    function(decodedText) {
      if (!scanActive) return;
      scanActive = false;
      $('result').style.display = 'block';
      $('result').innerHTML = '✅ <b>' + decodedText + '</b>';
      $('result').style.color = '#5ad8a6';
      showStatus('识别成功！');
      setTimeout(function() { $('result').style.display = 'none'; startScanner(); }, 3000);
    },
    function() {}
  );
  scanActive = true;
  try { videoTrack = document.querySelector('#qr-video video').srcObject.getVideoTracks()[0] || null; } catch(_) {}
  $('btn-flash').style.display = checkTorch() ? '' : 'none';
  $('loading').style.display = 'none';
  showStatus('⚡ 对准二维码');
}

async function switchCamera() {
  facingBack = !facingBack; $('btn-flash').style.display = 'none'; $('result').style.display = 'none';
  showStatus('切换…', '#aaa'); await startScanner();
}

function fileScan() {
  var i = document.createElement('input'); i.type = 'file'; i.accept = 'image/*';
  i.onchange = function(e) {
    var f = e.target.files[0]; if (!f) return;
    showStatus('解析…', '#f6bd16');
    var r = new Html5Qrcode('qr-video');
    r.scanFile(f, false).then(function(t) {
      $('result').style.display = 'block'; $('result').innerHTML = '✅ <b>' + t + '</b>'; r.clear();
    }).catch(function() {
      $('result').style.display = 'block'; $('result').innerHTML = '❌ 未识别'; $('result').style.color = '#ff6b6b'; r.clear();
    });
  };
  i.click();
}

$('btn-camera').addEventListener('click', switchCamera);
$('btn-flash').addEventListener('click', toggleFlash);
$('btn-file').addEventListener('click', fileScan);
startScanner().catch(function(err) {
  $('loading').style.display = 'none';
  showStatus('❌ ' + (err.message || '无法启动'), '#ff6b6b');
});
</script>
</body>
</html>
