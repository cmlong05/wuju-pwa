<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>扫码测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#reader{width:100%;height:100%}
#reader video{width:100%!important;height:100%!important;object-fit:cover!important}
#status{position:fixed;top:50px;left:0;right:0;z-index:99;text-align:center;font-size:14px;color:#5ad8a6;text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none}
#controls{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:99;display:flex;gap:16px}
#controls button{width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer}
#controls button:active{background:rgba(255,255,255,.3)}
#result{position:fixed;bottom:110px;left:16px;right:16px;z-index:99;background:rgba(0,0,0,.7);color:#5ad8a6;padding:12px 16px;border-radius:10px;text-align:center;font-size:15px;display:none;word-break:break-all}
</style>
</head>
<body>
<div id="reader"></div>
<div id="status"></div>
<div id="result"></div>
<div id="controls">
<button id="btnCam">🔄</button>
<button id="btnFlash" style="display:none">💡</button>
<button id="btnFile">🖼️</button>
</div>

<!-- ES module 加载原版代码，再赋值到 window -->
<script type="module">
import {Html5Qrcode} from './_qrcode.js';
window.Html5Qrcode = Html5Qrcode;
</script>

<script>
var $=function(id){return document.getElementById(id)};
var scanner=null, facingBack=true, active=false, track=null, flash=false;

// 等 Html5Qrcode 就绪
function init(){
  if(typeof Html5Qrcode==='undefined'){setTimeout(init,100);return}
  start().catch(function(e){$('status').textContent='❌ '+(e.message||'错误');$('status').style.color='#ff6b6b'});
}

async function stop(){
  if(scanner){try{if(scanner.getState()===2)await scanner.stop()}catch(e){}try{scanner.clear()}catch(e){}scanner=null}
  active=false;flash=false;track=null;
}

async function start(){
  $('result').style.display='none';$('btnFlash').style.display='none';
  await stop();
  scanner=new Html5Qrcode('reader');
  await scanner.start(
    {facingMode:facingBack?'environment':'user'},
    {fps:5,qrbox:{width:250,height:250},aspectRatio:1,disableFlip:false},
    function(text){if(!active)return;active=false;$('result').style.display='block';$('result').innerHTML='✅ <b>'+text+'</b>';$('status').textContent='识别成功!';setTimeout(function(){$('result').style.display='none';start()},3000)},
    function(){}
  );
  active=true;
  try{track=$('reader').querySelector('video').srcObject.getVideoTracks()[0]||null}catch(e){}
  $('btnFlash').style.display=track&&('torch'in(track.getCapabilities()))?'':'none';
  $('status').textContent='⚡ 对准二维码';$('status').style.color='#5ad8a6';
}

$('btnCam').onclick=async function(){facingBack=!facingBack;$('btnFlash').style.display='none';$('result').style.display='none';$('status').textContent='切换…';await start()};
$('btnFlash').onclick=function(){if(!track)return;flash=!flash;try{track.applyConstraints({advanced:[{torch:flash}]});$('btnFlash').textContent=flash?'🔦':'💡'}catch(e){}};
$('btnFile').onclick=function(){var i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=function(e){var f=e.target.files[0];if(!f)return;$('status').textContent='解析…';var r=new Html5Qrcode('reader');r.scanFile(f,false).then(function(t){$('result').style.display='block';$('result').innerHTML='✅ <b>'+t+'</b>';r.clear()}).catch(function(){$('result').style.display='block';$('result').innerHTML='❌ 未识别';r.clear()})};i.click()};
init();
</script>
</body>
</html>
